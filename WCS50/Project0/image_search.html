<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div>
            <ul id="navbar">
                <li id="navbar-item"><a href="index.html">Google Search</a></li>
            </ul>
        </div>
        <div id="search-main">
            <img src="Google.png" alt="Google Logo" height="92" center-align>
            <form action="https://www.google.com/search">
                <input id="main-input-text" type="text" name="q">
                <ul id="button-send">
                    <input type="submit" value="Google Search">
                    <input type="hidden" name="tbm" value="isch">
                </ul>
            
            </form>
        </div>

    </body>
</html>
