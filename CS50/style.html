<!DOCTYPE html> 
<html lang="en">
    <head>
        <title> Style </title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1 id="foo">Welcome to my Web Page!</h1>
        <h1 class = "baz">Welcome to my Web Page! 2</h1>
        <h1>Welcome to my Web Page! 3</h1>
        <h2> Another text </h2>
        Hello, world
    </body>

<!--
CSS Selectors
a,b - multiple element selector
a b - descendant selector: apply styling to list items found within an unordered list
a > b - child selector
a + b - adjacent sibling selector
[a=b]-  attribute selector
a:b - pseudoclass selector
a: :b - pseudoelement selector
-->
